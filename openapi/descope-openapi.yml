        Verify the embedded link token using the [Verify
        Token](/api/magic-link/verification/verify-token) endpoint.


        ### See Also

        - See [Embedded link Authentication](/customize/auth/embeddedlink/) for
        details about implementing embedded links.

        - See [The User Object](/api/overview#the-user-object) for further
        details on how to identify users and their contact information such as
        email addresses and phone number.
      operationId: EmbeddedLinkSignin
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmbeddedLinkSignInRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
