        Options](/auth-methods/oauth#social-login-oauth-providers) for a the out
        of the box list of providers.
      operationId: GetUserProviderToken
      parameters:
        - name: loginId
          in: query
          schema:
            type: string
        - name: provider
          in: query
          schema:
            type: string
        - name: withRefreshToken
          in: query
