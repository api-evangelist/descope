  /v1/auth/magiclink/verify:
    post:
      tags:
        - Verification
      summary: Verify Token
      description: >-
        ### Verify the magic link token from the end user


        Verify that the magic link token in the URL clicked by the end user
        matches and has not expired. This endpoint completes the magic link flow
        for:

        * sign up
            * [Sign-Up via email](/api/magic-link/email/sign-up)
            * [Sign-Up via SMS](/api/magic-link/sms/sign-up)
        * sign-in
            * [Sign-In via email](/api/magic-link/email/sign-in)
            * [Sign-In via SMS](/api/magic-link/sms/sign-in)
        * sign-in with auto sign-up
            * [Sign-In with Auto Sign-up via email](/api/magic-link/email/sign-in-auto-sign-up)
            * [Sign-In with Auto Sign-up via SMS](/api/magic-link/sms/sign-in-auto-sign-up)
        * update data
            * [update email](/api/magic-link/email/sign-up)
            * [update phone number](/api/magic-link/email/sign-up)

        ### Next Steps


        The response object will contain the user's details including the
        session and refresh JWTs.


        ### See Also

        - See [Magic link
        Authentication](/auth-methods/magic-link/with-sdks/client#introduction)
        for details about implementing magic links.

        - See [The User Object](/api/overview#the-user-object) for further
        details on how to identify users and their contact information such as
        email addresses and phone number.
