  /v1/mgmt/user:
    get:
      tags: []
      summary: Load User
      description: >-
        ### Load a user's data, using a valid management key.


        This API endpoint takes the user's loginId and then returns details of a
        user utilizing a valid management key. The response includes the
        following; however, there are additional items in the response that you
        can see below by expanding the response 200 OK.

        - loginIds

        - userId

        - name

        - email

        - phone

        - verified settings (phone, email)

        - Tenant configurations - which tenantIds, which roleNames


        _Note: Suppose you frequently load a user for a specific user detail,
        such as their email address or a

        particular custom attribute. In that case, you can save execution time
        and additional API/SDK calls to load

        the user by adding the items to the custom claim. For details on adding
        items to the custom claims, see

        [this
        documentation](/security-best-practices/custom-claims#using-custom-claims-within-descope-flows)._


        _Note: If you have access to all federated applications, the list will
        return as an empty array. Descope allows you to restrict which apps each
        user has access to, but by default gives access to all applications._


        ### Next Steps


        Once you have this data, you can utilize the response to prepare the
        payload to perform an [Update](/api/management/users/update-user) on the
        user.


        ### See also


        - See [Manage Users](/manage/users) for further details on managing
        users.

        - See [The User Object](/api/overview#the-user-object) for further
        details on the user object.
      operationId: LoadUser
      parameters:
        - name: loginId
          in: query
          schema:
            type: string
        - name: userId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
