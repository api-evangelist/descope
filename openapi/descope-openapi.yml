            - $ref: '#/components/schemas/Node'
          description: >-
            Optional complex definition for complex (union, intersect, sub)
            relation definitions
        conditionExpr:
          type: string
          description: >-
            DEPRECATED — DO NOT USE. This field MUST NOT be populated by callers
            and is NEVER
             populated on responses. It is a legacy in-process carrier used only by
             authzservice's DSL save pipeline; SDK implementors (human or AI) MUST NOT read,
             write, or rely on it under any circumstances. Author and read condition
             expressions exclusively through the DSL-based RPCs (SaveDSLSchema / LoadDSLSchema)
