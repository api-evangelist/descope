  /v1/auth/magiclink/update/email:
    post:
      tags:
        - Email
      summary: Update Email
      description: >-
        ### Update email of end user by sending magic link via email

        Update the email address of an existing end user by sending a magic link
        to the new email address. Descope will generate and deliver a clickable
        magic link to the new email address specified. After successfully
        verifying the magic link token the new email address will be used to
        deliver new magic links via email.


        The clickable magic link is made up of two parts - the URI you provide
        in the `URI` field and the magic link token generated by Descope. For
        example, if `URI=https://app.mycompany.com/magiclink/verify`, the
        clickable magic link will be
        `https://app.mycompany.com/magiclink/verify?t=magic-link-token.` Magic
        links expire in the time frame configured in the [Descope
        console](https://app.descope.com/settings/authentication/magiclink), so
        sending multiple magic links (for example, when an end user tries to
        sign-up a second or third time) does not invalidate prior magic links
        that have already been sent.


        The bearer token requires both the ProjectId and refresh JWT in the
        format `<Project ID>:<JWT>`, and can therefore only be run for end users
        who are currently signed-in.


        Note that `URI` is an optional parameter. If omitted - the project
        setting will apply.

        If provided - it should to be part of the allowed `Approved Domains`
        configured in the project settings.


        Descope allows you to associating multiple login IDs for a user during
        API update calls. For details on how this feature works, please review
        the details
        [here](/manage/users#associating-multiple-login-ids-for-a-user).


        ### Next Steps

        Verify the magic link token using the [Verify
        Token](/api/magic-link/verification/verify-token) endpoint.


        ### See Also

        - See [Magic link Authentication](/auth-methods/magic-link) for details
        about implementing magic links.

        - See [The User Object](/api/overview#the-user-object) for further
        details on how to identify users and their contact information such as
        email addresses and phone number.
