        You can also decide whether to invite the users, configure the
        inviteUrl, and whether to send invites via email or SMS.


        When importing with hashed passwords, see [this
        guide](/migrate/custom#importing-passwords) for further detailed
        configuration of password hash formats.


        ### Next Steps


