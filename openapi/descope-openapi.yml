  /v1/auth/otp/signup/email:
    post:
      tags:
        - Email
      summary: Sign-Up
      description: >-
        ### Sign-up new end user by sending an OTP code via email

        Initiate a sign-up process by sending a One-Time Password (OTP) to a new
        end user. Descope will generate and deliver the OTP code to the email
        address specified. Sending multiple OTP codes (for example, when an end
        user tries to sign-up a second or third time) will invalidate any OTP
        code that has already been sent.


        This endpoint will return an empty response object when it completes
        successfully. The endpoint will return a failure code if the email
        address is already registered.


        ### Next Steps

        Verify the OTP code using the [Verify OTP
        Code](/api/otp/email/verify-otp) endpoint to complete the user sign-up
        process. After successfully verifying OTP code the end user will be
        signed-in.


        ### See Also

        - See [The User Object](/api/overview#the-user-object) for further
        details on how to identify users and their contact information such as
        email addresses and phone number.

        - Use the [Sign-In](/api/otp/email/sign-in) endpoint to sign-in an
        existing end user.

        - Use the [Sign-In with Auto
        Sign-up](/api/otp/email/sign-in-auto-sign-up) endpoint to create a
        single sign-up and sign-in flow, which will create a new end user if
        they are not already registered.
      operationId: UserSignupOtpEmail
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OTPSignUpEmailRequest'
        required: true
      responses:
