  /scim/v2/Groups:
    get:
      tags: []
      summary: Search SCIM Groups
      description: >-
        ### Search SCIM groups, using a valid access key.


        This endpoint allows administrators to search SCIM groups. These groups
        have been created and associated to the Application and Descope tenant.


        The response includes an array of group objects within the Resources
        object. These group objects include details about the groups including
        the members.


        It is important to note the bearer token for SCIM API endpoints. The
        format is `ProjectId:AccessKey` the access key must be associated with
        the applicable tenant and has the tenant admin role.


        ### Next Steps


        Once you have this data, you can [Update an Existing SCIM
        Group](/api/management/tenants/scim/update-scim-group) or [Delete an
        Existing SCIM Group](/api/management/tenants/scim/delete-scim-group).
        You can add or remove users from the SCIM groups via [Update SCIM
        Group](/api/management/tenants/scim/update-scim-group).


        ### See also


        - See [SCIM Management](/scim) for further details on managing SCIM
        provisioning.
      operationId: SearchSCIMGroups
      parameters:
        - name: filter
          in: query
          schema:
            type: string
        - name: startIndex
          in: query
          schema:
            type: integer
            format: int32
        - name: count
          in: query
          schema:
            type: integer
            format: int32
        - name: excludedAttributes
          in: query
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SCIMGetGroupsResponse'
      security:
        - Descope Project ID:Access Key: []
      x-publishYaml: scimManagement
      x-order: 1
      x-meta:
        title: Search SCIM Groups | Scim Management
        description: Search SCIM groups, using a valid access key.
