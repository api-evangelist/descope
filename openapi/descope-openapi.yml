      description: >-
        ### Verify Enchanted Link token from user


        Verify that the enchanted link token in the URL clicked by the end user
        matches and has

        not expired. This endpoint completes the enchanted link flow for:

        * sign up
            * [Sign-Up via email](/api/enchanted-link/sign-up)
        * sign-in
            * [Sign-In via email](/api/enchanted-link/sign-in)
        * sign-in with auto sign-up
            * [Sign-In with Auto Sign-up via email](/api/enchanted-link/sign-in-auto-sign-up)
        * Update data
            * [update email](/api/enchanted-link/update-email)

        ### Next Steps


        Poll for the successful completion of the token verification using the
        [Poll Session](/api/enchanted-link/poll-session) endpoint, providing the
        `pendingRef` returned by the this endpoint.


        The response object will be empty when this endpoint completes
        successfully. The session information will be returned by the the [Poll
        Session](/api/enchanted-link/poll-session) endpoint.


        ### See Also

        - See [Enchanted link Authentication](/api/enchantedlink/) for details
        about implementing enchanted links.

        - See [The User Object](/api/overview#the-user-object) for further
        details on how to identify users and their contact information such as
        email addresses and phone number.
      operationId: VerifyEnchantedLink
