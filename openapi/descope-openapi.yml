        Verify the OTP code using the [Verify OTP
        Code](/api/otp/email/verify-otp) endpoint to complete the update
        process.

        After successfully verifying the code the new email address will replace
        the original email address.


        ### See Also

        - See [The User Object](/api/overview#the-user-object) for further
        details on how to identify users and their contact information such as
        email address and phone number.

        - See the [Verify OTP Code](/api/otp/email/verify-otp) endpoint, which
        will return the Refresh Jwt needed.
