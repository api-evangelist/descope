  /v1/mgmt/user/create:
    post:
      tags: []
      summary: Create User
      description: >-
        ### Create a new user, using a valid management key.


        This API endpoint will create a new user utilizing a valid management
        key.


        This API endpoint allows you to configure all aspects of a user:

        - loginId

        - email

        - phone

        - verified settings (phone, email) - one must be set to true

        - displayName

        - roleNames

        - Tenant configurations - which tenantIds, which roleNames. The
        userTenants can include multiple items

        Ex:

        ```

        "userTenants": [

        {
          "tenantId": "T2IMjmRfYTQHlbaastz3im59ERS3",
          "roleNames": [
            "Test"
          ]
        },

        {
          "tenantId": "T2Igau6dX1R6SkomtFCdBLrc3r67",
          "roleNames": [
            "Test"
          ]
        }

        ```


        Additionally, you can create a user with multiple login IDs by passing
        an array of loginIds in string format within the `additionalIdentifiers`
        key.


        ### Next Steps


        Once the user is created, the user can then login utilizing any sign-in
        api supported. This will then switch the user from invited to active.


        ### See also


        - See [Manage User](/manage/users) for further details on managing
        users.

        - See [The User Object](/api/overview#the-user-object) for further
        details on the user object.
      operationId: CreateUser
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
      security:
        - Descope Project ID and Management Key: []
      x-publishYaml: userManagement
      x-order: 6
      x-meta:
        title: Create User | User Management
        description: Create a new user, using a valid management key.
        keywords: api, user management
