  /v1/auth/sso/exchange:
    post:
      tags:
      - Auth
      summary: Exchange SSO Code
      description: '### Exchange SSO SAML code for Descope user session


        This endpoint will exchange the unique SAML code (also called a token) for the Descope session information needed for managing the end user session. Call this endpoint from your code flow that responds to the `url` that was returned by the [Sign-In](/api/oauth/sign-up-sign-in) endpoint.


        The unique code `<unique-code\>` is appended as a URL parameter: `code=<unique-code\>`, for example, `url = https://sso.mycompany.com/mywork.htm?code=<unique-code\>`.


        ### Next Steps


        1. Extract the unique code `<unique-code\>` from the URL parameter.

        2. Call this endpoint, passing the `<unique-code\>` as the request parameter


        The response object includes the session JWT (sessionJwt) and refresh JWT (refreshJwt) when this endpoint completes successfully.


        ### See Also

        - See [The User Object](/api/overview#the-user-object) for further details on how to identify users and their contact information such as email addresses and phone number.'
      operationId: ExchangeCodesso
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExchangeTokenRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JWTResponse'
      security:
      - Descope Project ID: []
      x-publishYaml: SSO
      x-order: 2
      x-meta:
        title: Exchange SSO Code | SSO
        description: Exchange SSO SAML code for Descope user session
        keywords: api, sso
  /v1/auth/totp/signup:
    post:
      tags:
      - Auth
      summary: Sign-Up
      description: '### Sign-up new end user via TOTP


        Initiate a TOTP sign-up process for a new end user. Descope will generate a TOTP key (also called a secret or seed) that will be entered into the end user''s authenticator app so that TOTP codes can be successfully verified. The new end user will be registered after the full TOTP sign-up flow has successfully completed.


        If the end user is already registered use the [add/update](/api/totp/add-update-key) endpoint to add TOTP funtionality to an existing end user, to prevent the same person being registered twice.


        ### Next Steps

        1. Display the TOTP key so it can be entered into their authenticator app. The TOTP key is returned in the response object in three ways, to ensure it can easily be entered into the end user''s authenticator app.

        2. Prompt the end user user for a TOTP code generated by their authenticator app.

        3. Verify the TOTP code using the [Sign-In / Verify](/api/totp/sign-in-verify) endpoint to complete the sign-in process. After successfully verifying the TOTP code the new end user will be registered using the details you provided in the body of this endpoint.


        ### See Also

        - See [The User Object](/api/overview#the-user-object) for further details on how to identify users and their contact information such as email addresses and phone number.

        - Use the [add/update](/api/totp/add-update-key) endpoint to add TOTP funtionality to an existing end user.'
      operationId: SignUpTOTP
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TOTPSignUpRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TOTPResponse'
      security:
      - Descope Project ID: []
      x-publishYaml: TOTP
      x-order: 1
      x-meta:
        title: Sign-Up | TOTP
        description: Sign-up new end user via TOTP
        keywords: api, totp
  /v1/auth/totp/verify:
    post:
      tags:
      - Auth
      summary: Sign-In / Verify
      description: '### Verify the TOTP of an end user


        Verify the TOTP code of an end user. This endpoint is the final API call for the following TOTP flows:

        * Sign-In - If the end user is already registered, this end-point is the only call you need to sign-in that user.

        * Sign-Up - If you are implementing a sign-up flow, this endpoint will verify the TOTP code and complete the sign-up process

        * Add/ Update - If you are implementing an Add / Update flow, this endpoint completes the process of adding/updating the TOTP key for that user.


        The response object includes the session JWT `sessionJwt` and refresh JWT `refreshJwt` when the endpoint completes successfully, and the end user will be signed in.


        ### See Also

        - See [The User Object](/api/overview#the-user-object) for further details on how to identify users and their contact information such as email addresses and phone number.

        - See [User Login Options](/api/overview#user-login-options) for further details on loginOptions.'
      operationId: VerifyCodeTOTP
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TOTPVerifyCodeRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JWTResponse'
      security:
      - Descope Project ID: []
      x-publishYaml: TOTP
      x-order: 2
      x-meta:
        title: Sign-In / Verify | TOTP
        description: Verify the TOTP of an end user
        keywords: api, totp
  /v1/auth/totp/update:
    post:
      tags:
      - Auth
      summary: Add / Update Key
      description: "### Add or update TOTP key for existing end user\n\nInitiate a flow to add TOTP functionality for an existing end user, or to update the TOTP key for an existing end user. Descope will generate a TOTP key (also called a secret or seed) that will be entered into the end user's authenticator app so that TOTP codes can be successfully verified. The new end user will be registered after the full Add / Update TOTP flow has successfully completed. The bearer token requires both the ProjectId and refresh JWT in the format `<Project ID>:<JWT>`, and can therefore only be run for end users who are currently signed-in.\n\nIf the end user is not yet registered use the [Sign-Up](/api/totp/sign-up) endpoint to register the user.\n\n### Next Steps\n1. Display the TOTP key to the end user so the key can be entered into the authenticator app. Use any of the following methods to display the key to your end user:\n    * (recommended) Redirect the end user session to the `provisioningURL` returned in the response body. The URL displays the key as a QR code that can be scanned directly from the authenticator app.\n    * Render the QR code using your own web page using the `image` (the QR code as Base64) returned in the response body.\n    * If your end user cannot scan a QR code, present the `key` returned in the response body so the key can be pasted into their authenticator app. If the authenticator app prompts, the end user must select key type: \"time based\".\n2. Prompt the end user user for a TOTP code generated by their authenticator app.\n3. Verify the TOTP code using the [Sign-In / Verify](/api/totp/sign-in-verify) endpoint to complete the Add / Update process. After successfully verifying the TOTP code the new TOTP key will be used to validate future TOTP code.\n\n### See Also\n- See [The User Object](/api/overview#the-user-object) for further details on how to identify users and their contact information such as email addresses and phone number."
      operationId: UpdateUserTOTP
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TOTPUpdateRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TOTPResponse'
      security:
      - Descope Project ID:Refresh JWT: []
      x-publishYaml: TOTP
      x-order: 3
      x-meta:
        title: Add / Update Key | TOTP
        description: Add or update TOTP key for existing end user
        keywords: api, totp
