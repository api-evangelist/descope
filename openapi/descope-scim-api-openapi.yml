        displayName:
          type: string
        detail:
          type: string
        attributes:
          type: object
        status:
          type: integer
          format: int32
    SCIMUserRequest:
      type: object
      properties:
        userId:
          type: string
        displayName:
          type: string
          description: "The following values are manipulated by the marshaler in httpgateway/marshaler.go\n in case of changing or adding new ones, need to edit the marshaler as well"
        emails:
          type: array
          items:
            $ref: '#/components/schemas/SCIMUserEmail'
        active:
          type: boolean
        name:
          $ref: '#/components/schemas/SCIMUserName'
        userName:
          type: string
        attributes:
          type: object
    SCIMGroupResponse:
      type: object
      properties:
        displayName:
          type: string
        schemas:
          type: array
          items:
            type: string
        id:
          type: string
        members:
          type: array
          items:
            $ref: '#/components/schemas/SCIMGroupMember'
        meta:
          $ref: '#/components/schemas/SCIMGroupResourceMeta'
        externalId:
          type: string
        detail:
          type: string
        status:
          type: integer
          format: int32
    SCIMGetGroupsResponse:
      type: object
      properties:
        totalResults:
          type: integer
          format: int32
        startIndex:
          type: integer
          format: int32
        itemsPerPage:
          type: integer
          format: int32
        schemas:
          type: array
          items:
            type: string
        Resources:
          type: array
          items:
            $ref: '#/components/schemas/SCIMGroupResponse'
        detail:
          type: string
        status:
          type: integer
          format: int32
    SCIMResourceTypesResponse:
      type: object
      properties:
        values:
          type: array
          items:
            $ref: '#/components/schemas/ResourceType'
    ResourceType:
      type: object
      properties:
        schemas:
          type: array
          items:
            type: string
        id:
          type: string
        name:
          type: string
        description:
          type: string
        endpoint:
          type: string
        schema:
          type: string
    SCIMPatchOperationValue:
      type: object
      properties:
        value:
          type: string
          description: "The following values are manipulated by the marshaler in httpgateway/marshaler.go\n in case of changing or adding new ones, need to edit the marshaler as well"
        display:
          type: string
    SCIMGetUsersResourceMeta:
      type: object
      properties:
        created:
          type: object
        location:
          type: string
        lastModified:
          type: object
        resourceType:
          type: string
    Supported:
      type: object
