        location:
          type: string
        lastModified:
          type: object
        resourceType:
          type: string
    Filter:
      type: object
      properties:
        supported:
          type: boolean
        maxResults:
          type: integer
          format: int32
    AuthenticationSchemes:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        primary:
          type: boolean
        specUri:
          type: string
        type:
          type: string
    SCIMUserName:
      type: object
      properties:
        givenName:
          type: string
        familyName:
          type: string
        middleName:
          type: string
    SCIMPatchRequest:
      type: object
      properties:
        userId:
          type: string
        groupId:
          type: string
        operations:
          type: array
          items:
            $ref: '#/components/schemas/SCIMPatchOperation'
    SCIMUserEmail:
      type: object
      properties:
        value:
          type: string
        primary:
          type: boolean
        type:
          type: string
  securitySchemes:
    Descope Project ID:
      type: http
      scheme: bearer
      bearerFormat: Project ID
      description: Project ID as bearer token.
    Descope Project ID:Refresh JWT:
      type: http
      scheme: bearer
      bearerFormat: Project ID:Refresh JWT
      description: Project ID:Refresh JWT as bearer token.
    Descope Project ID:Access Key:
      type: http
      scheme: bearer
      bearerFormat: ProjectId:AccessKey
      description: Project ID:Access Key as bearer token.
    Descope Project ID:Session JWT:
      type: http
      scheme: bearer
      bearerFormat: Project ID:Session JWT
      description: Project ID:Session JWT as bearer token.
    Descope Project ID and Management Key:
      type: http
      description: Project ID:Management Key as bearer token.
      scheme: bearer
      bearerFormat: ProjectId:ManagementKey
externalDocs:
  description: Descope Server
  url: https://docs.descope.com
