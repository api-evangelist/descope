  /v1/mgmt/user/update:
    post:
      tags:
      - Mgmt
      summary: Update User
      description: '### Updates a user''s details, using a valid management key.


        This API endpoint will update a user''s details of a user utilizing a valid management key.


        It is important to understand the update will take the configurations for the user provided and will overwrite all user settings. This means that if the user currently has email and phone, but the update only includes email, the phone and other non-provided configurations will be removed.


        This API endpoint will remove any details that are not provided. It is preferred to use other updates supported by the API, such as the following options:

        - [Update User Status](/api/management/users/update-user-status)

        - [Update User Email](/api/management/users/update-user-email)

        - [Update User Phone](/api/management/users/update-user-phone)

        - [Update User Display Name](/api/management/users/update-user-display-name)

        - [Update User Add Tenant](/api/management/users/update-user-add-tenant)

        - [Update User Remove Tenant](/api/management/users/update-user-remove-tenant)

        - [Update User Add Role](/api/management/users/update-user-add-roles)

        - [Update User Remove Role](/api/management/users/update-user-remove-roles)


        Additionally, you can update a user with multiple login IDs by passing an array of loginIds in string format within the `additionalIdentifiers` key.


        It is suggested to gather the current user configurations via [Load User](/api/management/users/load-user) in order to assist you in building the payload for this api endpoint.


        ### See also


        - See [Manage Users](/manage/users) for further details on managing users.

        - See [The User Object](/api/overview#the-user-object) for further details on the user object.'
      operationId: UpdateUser
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
      security:
      - Descope Project ID and Management Key: []
      x-publishYaml: userManagement
      x-order: 8
      x-meta:
        title: Update User | User Management
        description: Updates a user's details, using a valid management key.
        keywords: api, user management
